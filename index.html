<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SNIP — URL Shortener</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #c8f135;
      --accent2: #ff5e5e;
      --text: #f0f0f0;
      --muted: #555;
      --radius: 4px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,241,53,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,241,53,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    header {
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 3.5rem;
      letter-spacing: -2px;
      line-height: 1;
      color: var(--accent);
    }

    .tagline {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
    }

    input[type="url"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      border-color: var(--accent);
    }

    input[type="url"]::placeholder {
      color: var(--muted);
    }

    button {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      padding: 0.85rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { background: #d8ff40; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* Result box */
    .result {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      animation: fadeUp 0.3s ease both;
    }

    .result.visible { display: flex; }

    .result-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-url-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--accent);
      padding: 0.85rem 1rem;
    }

    .result-url {
      flex: 1;
      font-size: 0.9rem;
      color: var(--accent);
      word-break: break-all;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.15s, color 0.15s;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: var(--accent);
      color: #0a0a0a;
    }

    .copy-btn.copied {
      background: var(--accent);
      color: #0a0a0a;
    }

    /* Analytics */
    .analytics-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
      align-self: flex-start;
    }

    .analytics-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .analytics-panel {
      display: none;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1rem;
      gap: 1rem;
      animation: fadeUp 0.3s ease both;
    }

    .analytics-panel.visible { display: flex; }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-top: 0.25rem;
    }

    /* Error */
    .error-msg {
      display: none;
      font-size: 0.75rem;
      color: var(--accent2);
      padding: 0.75rem 1rem;
      border: 1px solid var(--accent2);
      background: rgba(255,94,94,0.05);
      animation: fadeUp 0.3s ease both;
    }

    .error-msg.visible { display: block; }

    /* History */
    .history {
      margin-top: 2rem;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .history-header {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.15s;
      animation: fadeUp 0.3s ease both;
    }

    .history-item:hover { border-color: var(--accent); }

    .history-original {
      flex: 1;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-short {
      color: var(--accent);
      white-space: nowrap;
    }

    .history-arrow {
      color: var(--muted);
      font-size: 0.7rem;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #0a0a0a;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">SNIP/</div>
      <div class="tagline">Instant URL Shortener — localhost:8080</div>
    </header>

    <div class="card">
      <div class="input-row">
        <input type="url" id="urlInput" placeholder="https://paste-your-long-url-here.com" />
        <button id="shortenBtn" onclick="shortenUrl()">Shorten</button>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <div class="divider" id="divider" style="display:none"></div>

      <div class="result" id="result">
        <div class="result-label">Your short link</div>
        <div class="result-url-row">
          <span class="result-url" id="resultUrl"></span>
          <button class="copy-btn" id="copyBtn" onclick="copyUrl()">Copy</button>
        </div>
        <button class="analytics-btn" onclick="toggleAnalytics()">View Analytics</button>
        <div class="analytics-panel" id="analyticsPanel">
          <div class="stat">
            <div class="stat-value" id="clickCount">—</div>
            <div class="stat-label">Total Clicks</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="shortCodeDisplay">—</div>
            <div class="stat-label">Short Code</div>
          </div>
        </div>
      </div>
    </div>

    <div class="history" id="historySection" style="display:none">
      <div class="history-header">Recent Links</div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8080/api';
    let currentShortCode = '';
    let history = JSON.parse(localStorage.getItem('snip_history') || '[]');

    const urlInput = document.getElementById('urlInput');

    urlInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenUrl();
    });

    async function shortenUrl() {
      const url = urlInput.value.trim();
      if (!url) return showError('Please enter a URL.');

      const btn = document.getElementById('shortenBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      hideError();
      hideResult();

      try {
        const res = await fetch(`${API}/shorten`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ originalUrl: url })
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const shortUrl = await res.text();
        currentShortCode = shortUrl.split('/').pop();

        showResult(shortUrl);
        addToHistory(url, shortUrl);
      } catch (err) {
        showError('Failed to connect to backend. Is Spring Boot running on port 8080?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Shorten';
      }
    }

    function showResult(shortUrl) {
      document.getElementById('resultUrl').textContent = shortUrl;
      document.getElementById('divider').style.display = 'block';
      document.getElementById('result').classList.add('visible');
      document.getElementById('analyticsPanel').classList.remove('visible');
      document.getElementById('copyBtn').textContent = 'Copy';
      document.getElementById('copyBtn').classList.remove('copied');
    }

    function hideResult() {
      document.getElementById('result').classList.remove('visible');
      document.getElementById('divider').style.display = 'none';
    }

    function copyUrl() {
      const url = document.getElementById('resultUrl').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    async function toggleAnalytics() {
      const panel = document.getElementById('analyticsPanel');
      if (panel.classList.contains('visible')) {
        panel.classList.remove('visible');
        return;
      }

      try {
        const res = await fetch(`${API}/analytics/${currentShortCode}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        document.getElementById('clickCount').textContent = data.clickCount ?? 0;
        document.getElementById('shortCodeDisplay').textContent = data.shortCode;
        panel.classList.add('visible');
      } catch {
        showError('Could not fetch analytics.');
      }
    }

    function addToHistory(original, shortUrl) {
      history.unshift({ original, shortUrl });
      if (history.length > 5) history.pop();
      localStorage.setItem('snip_history', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const section = document.getElementById('historySection');
      const list = document.getElementById('historyList');

      if (history.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      list.innerHTML = '';

      history.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.onclick = () => navigator.clipboard.writeText(item.shortUrl);
        div.innerHTML = `
          <span class="history-original">${item.original}</span>
          <span class="history-arrow">→</span>
          <span class="history-short">${item.shortUrl.replace('http://localhost:8080', '')}</span>
        `;
        list.appendChild(div);
      });
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    // Load history on page start
    renderHistory();
  </script>
</body>
</html>
